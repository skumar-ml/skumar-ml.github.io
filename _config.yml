# Site settings
title: Home
email: sk138@illinois.edu
description: >-
  Personal website of Your Name, PhD Student in Your Field
  at Your University.
baseurl: ""
url: "https://skumar-ml.github.io"
twitter_username: skumar_ml
github_username:  skumar-ml
google_scholar: zHuT7aIAAAAJ
linkedin_username: shubhamkumar-ml
youtube_channel: skumar-ml
google_analytics: G-T4PTFWE45N

# Recent News on the home page: only items on or after this date (YYYY-MM-DD)
news_cutoff_date: 2022-01-01

# Build settings
markdown: kramdown
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge
  auto_ids: true
  header_links: true
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Collections
collections:
  news:
    output: true
  projects:
    output: true

# Navigation
header_pages:
  - projects.md
  - blog.md

# Blog posts: /blog/post-slug/ (no date in URL)
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: /blog/:slug/
  - scope:
      path: ""
      type: "news"
    values:
      sitemap: false
  - scope:
      path: "_posts/2023-01-01-welcome-to-my-website.md"
    values:
      sitemap: false
  - scope:
      path: "_projects/sample-project.md"
    values:
      sitemap: false

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore
  - README.md 